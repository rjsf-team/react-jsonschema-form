packages:
  - 'packages/*'

overrides:
  'sockjs>uuid': ^14.0.0

onlyBuiltDependencies:
  - '@parcel/watcher'
  - ata-validator
  - core-js
  - esbuild
  - nx
allowBuilds:
  '@parcel/watcher': set this to true or false
  ata-validator: set this to true or false
  core-js: set this to true or false
  esbuild: set this to true or false
  nx: set this to true or false
